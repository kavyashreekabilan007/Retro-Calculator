<!DOCTYPE html>
<html>

<head>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
</head>

<body>
    <h4 id="title">CALCULATOR</h4>
    <div id="body">
        <input type="text" id="display" disabled>
        <div>
            <TABLE style="padding-top:10px;">
                <tr>
                    <td><button class="buttons" onclick="press(1)"> 1</button></td>
                    <td><button class="buttons" onclick="press(2)"> 2</button></td>
                    <td><button class="buttons" onclick="press(3)"> 3</button></td>
                    <td><button class="buttons" onclick="setOperator('+')"> +</button></td>

                </tr>
                <tr>
                    <td><button class="buttons" onclick="press(4)"> 4</button></td>
                    <td><button class="buttons" onclick="press(5)"> 5</button></td>
                    <td><button class="buttons" onclick="press(6)"> 6</button></td>
                    <td><button class="buttons" onclick="setOperator('-')">-</button></td>
                </tr>
                <tr>
                    <td><button class="buttons" onclick="press(7)"> 7</button></td>
                    <td><button class="buttons" onclick="press(8)"> 8</button></td>
                    <td><button class="buttons" onclick="press(9)"> 9</button></td>
                    <td><button class="buttons" onclick="setOperator('X')"> X</button></td>
                </tr>
                <tr>
                    <td><button class="buttons" onclick="press('.')"> .</button></td>
                    <td><button class="buttons" onclick="press(0)"> 0</button></td>
                    <td><button class="buttons" onclick="calculate()"> =</button></td>
                    <td><button class="buttons" onclick="setOperator('/')"> /</button></td>
                </tr>
                <tr>

                    <button id="buttonclear" onclick=clearDisplay()>C</button>

                </tr>
            </TABLE>
        </div>





    </div>
    <style>
        * {
            font-family: 'Tiny5', sans-serif;
        }

        #title {
            font-size: 40px;
            text-align: center;
            color: blue;
            text-shadow: 4px 0px 0px rgba(255, 0, 0, 1);
            margin-bottom: 0px;
        }

        #body {
            border: 2px solid rgb(77, 77, 77);
            height: 500px;
            width: 350px;
            margin: auto;

            border-radius: 20px;
            background-color: rgb(204, 142, 252);
            padding-left: 5px;
            font-size: 20px;
            box-shadow: 24px 31px 4px 1px rgba(0, 0, 0, 0.38);



        }

        #display {
            border: 2px solid rgb(77, 77, 77);
            height: 100px;
            width: 330px;
            margin: auto;
            margin-top: 5px;
            border-radius: 20px;
            background-color: rgb(255, 240, 153);
            margin-left: 2px;
            font-size: 40px;
        }

        .buttons {
            border: 2px solid rgb(77, 77, 77);
            height: 70px;
            width: 75px;
            border-radius: 20px;
            margin-left: 5px;
            background-color: rgb(250, 173, 92);
            font-size: 30px;

        }

        .buttons:hover {
            background-color: rgb(251, 156, 54);
        }

        .buttons:active {
            background-color: rgb(246, 138, 22);
        }

        #buttonclear {
            border: 2px solid rgb(77, 77, 77);
            height: 50px;
            width: 75px;
            border-radius: 20px;
            margin-left: 5px;
            background-color: rgb(248, 128, 112);
            font-size: 20px;
            margin-top: 10px;
        }

        #buttonclear:hover {
            background-color: rgb(248, 98, 78);
        }

        #buttonclear:active {
            background-color: rgb(252, 70, 46);
        }
    </style>
    <script>
        let currentInput = ""
        let num1 = 0;
        let num2 = 0;
        let operator = null;

        let result = 0;
        function press(value) {
            currentInput += value;
            document.getElementById("display").value = currentInput;
        }
        function setOperator(op) {
            num1 = Number(currentInput);//changing string to num1
            operator = op;//storint op in operator
            currentInput = ""//clearing current iput for nxt input
        }
        function calculate() {
            num2 = Number(currentInput);
            if (operator === '+') {
                result = num1 + num2;
            }
            else if (operator === '-') {
                result = num1 - num2;
            }
            else if (operator === 'X') {
                result = num1 * num2;
            } else {
                result = num1 / num2;
            }
            document.getElementById("display").value = result;
            currentInput = result.toString();
        }
        function clearDisplay() {//dont use clear as function name.as it is built in function on browser
            currentInput = ""
            num1 = 0;
            operator = null;
            num2 = 0;
            document.getElementById("display").value = "";
        }
    </script>
</body>

</html>
